<!doctype html>
<html lang="en" data-theme="winter">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aqua Dive Egypt</title>
    <link rel="shortcut icon" href="public/swimming-silhouette.png"
      type="image/x-icon">
  </head>
  <body>
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex flex-row pl-2 gap-2">
        <img src="/swimming-silhouette.png" class="w-8 md:w-10 lg:w-15 h-auto"
          alt="swimming-silhouette">
        <!-- Title  -->
        <h1
          class="text-sm md:text-lg lg:text-2xl font-bold flex items-center ">Aqua
          Dive
          Egypt</h1>
      </div>
      <div class="navbar-end">
        <ul class="menu menu-horizontal px-1">
          <li><a>Home</a></li>
          <li><a>Courses</a></li>
          <li><a>Gallery</a></li>
          <li><a>Contact</a></li>
          <li>
            <details>
              <summary>Dive Sites</summary>
              <ul class="bg-base-100 rounded-t-none p-2">
                <li><a>Blue Hole</a></li>
                <li><a>Ras Mohammed</a></li>
              </ul>
            </details>
          </li>
        </ul>
        <div class="flex items-center">

          <label class="toggle text-base-content">
            <input type="checkbox" value="aqua" class="theme-controller" />

            <svg aria-label="sun" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"><g stroke-linejoin="round"
                stroke-linecap="round" stroke-width="2" fill="none"
                stroke="currentColor"><circle cx="12" cy="12"
                  r="4"></circle><path
                  d="M12 2v2"></path><path d="M12 20v2"></path><path
                  d="m4.93 4.93 1.41 1.41"></path><path
                  d="m17.66 17.66 1.41 1.41"></path><path
                  d="M2 12h2"></path><path
                  d="M20 12h2"></path><path
                  d="m6.34 17.66-1.41 1.41"></path><path
                  d="m19.07 4.93-1.41 1.41"></path></g></svg>

            <svg aria-label="moon" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"><g stroke-linejoin="round"
                stroke-linecap="round" stroke-width="2" fill="none"
                stroke="currentColor"><path
                  d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></g></svg>

          </label>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
